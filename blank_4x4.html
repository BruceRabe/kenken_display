<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KenKen 4×4</title>
<style>
  @media print {
    body { margin: 0; }
  }
  body {
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
  }
  table {
    border-collapse: collapse;
  }
  td {
    width: 90px;
    height: 90px;
    position: relative;
    vertical-align: top;
    padding: 0;
  }
  .label {
    position: absolute;
    top: 2px;
    left: 3px;
    font-size: 22px;
    font-weight: bold;
    line-height: 1;
  }
  .solution {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 45px;
    color: #333;
  }
  .hints {
    margin-top: 24px;
    font-size: 14px;
  }
  .hints h3 {
    margin: 0 0 8px;
    font-size: 16px;
  }
  .hints ul {
    margin: 0;
    padding-left: 20px;
  }
  .hints li {
    margin-bottom: 4px;
  }
</style>
</head>
<body>
  <table>
      <tr><td style="border-top: 3px solid #000; border-left: 3px solid #000; border-bottom: 1px solid #ccc; border-right: 3px solid #000"><span class="label">4+</span></td><td style="border-top: 3px solid #000; border-left: 3px solid #000; border-bottom: 3px solid #000; border-right: 1px solid #ccc"><span class="label">1-</span></td><td style="border-top: 3px solid #000; border-left: 1px solid #ccc; border-bottom: 3px solid #000; border-right: 3px solid #000"></td><td style="border-top: 3px solid #000; border-left: 3px solid #000; border-bottom: 3px solid #000; border-right: 3px solid #000"><span class="label">4</span></td></tr>
      <tr><td style="border-top: 1px solid #ccc; border-left: 3px solid #000; border-bottom: 3px solid #000; border-right: 3px solid #000"></td><td style="border-top: 3px solid #000; border-left: 3px solid #000; border-bottom: 3px solid #000; border-right: 1px solid #ccc"><span class="label">5+</span></td><td style="border-top: 3px solid #000; border-left: 1px solid #ccc; border-bottom: 3px solid #000; border-right: 3px solid #000"></td><td style="border-top: 3px solid #000; border-left: 3px solid #000; border-bottom: 1px solid #ccc; border-right: 3px solid #000"><span class="label">6×</span></td></tr>
      <tr><td style="border-top: 3px solid #000; border-left: 3px solid #000; border-bottom: 1px solid #ccc; border-right: 1px solid #ccc"><span class="label">10+</span></td><td style="border-top: 3px solid #000; border-left: 1px solid #ccc; border-bottom: 1px solid #ccc; border-right: 3px solid #000"></td><td style="border-top: 3px solid #000; border-left: 3px solid #000; border-bottom: 1px solid #ccc; border-right: 3px solid #000"><span class="label">2÷</span></td><td style="border-top: 1px solid #ccc; border-left: 3px solid #000; border-bottom: 3px solid #000; border-right: 3px solid #000"></td></tr>
      <tr><td style="border-top: 1px solid #ccc; border-left: 3px solid #000; border-bottom: 3px solid #000; border-right: 1px solid #ccc"></td><td style="border-top: 1px solid #ccc; border-left: 1px solid #ccc; border-bottom: 3px solid #000; border-right: 3px solid #000"></td><td style="border-top: 1px solid #ccc; border-left: 3px solid #000; border-bottom: 3px solid #000; border-right: 3px solid #000"></td><td style="border-top: 3px solid #000; border-left: 3px solid #000; border-bottom: 3px solid #000; border-right: 3px solid #000"><span class="label">1</span></td></tr>
  </table>
  <div class="hints"><h3>Possible combinations</h3><ul><li><strong>10+</strong> (4 cells): {1, 1, 4, 4}; &nbsp;{1, 2, 3, 4}; &nbsp;{1, 3, 3, 3}; &nbsp;{2, 2, 2, 4}; &nbsp;{2, 2, 3, 3}</li></ul></div>
</body>
</html>
